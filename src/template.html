<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <main>
      <div class="header">
        <div class="left-header">
          <div class="location-container"></div>
          <div class="date-time-container"></div>
        </div>
        <div class="right-header">
          <div class="right-box">
            <button class="unit-toggle">
              <span class="toggle-slider"></span>
              <span class="toggle-label active">°C</span>
              <span class="toggle-label">°F</span>
            </button>
          </div>
        </div>
      </div>
      <div class="current-weather">
        <div class="current-left">
          <div class="current-condition"></div>
          <div class="current-temperature"></div>
          <div class="current-feel"></div>
          <div class="current-description"></div>
        </div>
        <div class="current-right"></div>
      </div>
      <div class="details"></div>
      <div class="hourly-forecast">
        HOURLY FORECAST
        <div class="hourly-card-container"></div>
      </div>
      <div class="daily">
        7-DAY FORECAST
        <div class="daily-card-container"></div>
      </div>
    </main>
  </body>
</html>
